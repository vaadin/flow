name: Update @since tags

# Reconcile Javadoc @since tags for any branch against the published release
# history, and open a PR with the result. Lives on the default branch; the target
# branch is chosen at dispatch time (the version is derived from that branch's pom).

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to reconcile (the PR is opened against it)
        required: true
        default: main
      dev:
        description: Target version override (blank = derive major.minor from pom)
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Disable git hooks (husky isn't set up in CI)
        run: git config core.hooksPath /dev/null

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install jbang
        run: |
          curl -Ls https://sh.jbang.dev | bash -s - app setup
          echo "$HOME/.jbang/bin" >> "$GITHUB_PATH"

      # Cache keys: sources depend only on the published versions; the parsed index
      # also depends on the tool. A new release changes META; a tool change changes TOOL.
      - name: Compute cache keys
        id: keys
        run: |
          META=$(for a in flow-server flow-data flow-html-components flow-polymer-template flow-dnd flow-webpush flow-react; do
                   curl -s --max-time 60 "https://repo1.maven.org/maven2/com/vaadin/$a/maven-metadata.xml"
                 done | sha256sum | cut -c1-16)
          TOOL=$(sha256sum scripts/since-tags/SinceTool.java | cut -c1-16)
          echo "meta=$META" >> "$GITHUB_OUTPUT"
          echo "tool=$TOOL" >> "$GITHUB_OUTPUT"

      - name: Cache extracted sources (~/.cache/since-tags)
        uses: actions/cache@v4
        with:
          path: ~/.cache/since-tags
          key: since-tags-src-${{ steps.keys.outputs.meta }}
          restore-keys: since-tags-src-

      - name: Cache built index (.since-index)
        id: idxcache
        uses: actions/cache@v4
        with:
          path: .since-index
          key: since-tags-idx-${{ steps.keys.outputs.tool }}-${{ steps.keys.outputs.meta }}

      - name: Determine target version
        id: ver
        run: |
          DEV="${{ inputs.dev }}"
          if [ -z "$DEV" ]; then
            V=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
            DEV=$(echo "$V" | sed 's/-SNAPSHOT//' | awk -F. '{print $1"."$2}')
          fi
          echo "dev=$DEV" >> "$GITHUB_OUTPUT"
          echo "Target version: $DEV"

      - name: Reconcile @since
        run: SKIP_INDEX=${{ steps.idxcache.outputs.cache-hit == 'true' && '1' || '0' }} bash scripts/since-tags/run.sh "${{ steps.ver.outputs.dev }}"

      - name: Job summary
        run: |
          {
            echo "### @since reconciliation — \`${{ inputs.branch }}\` (version ${{ steps.ver.outputs.dev }})"
            echo '```'
            git diff --shortstat -- '*.java' || true
            grep -hE '^(correct|fixed|filled|new in dev|removed|created javadoc|no javadoc)' .since-index/report-*.md \
              | awk -F: '{gsub(/[^0-9]/,"",$2); a[$1]+=$2} END{for(k in a) printf "%-26s %d\n", k, a[k]}' || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          base: ${{ inputs.branch }}
          branch: since-tags/${{ inputs.branch }}
          add-paths: "**/*.java"
          title: "docs: reconcile @since tags (${{ steps.ver.outputs.dev }})"
          commit-message: |
            docs: reconcile @since tags

            Automated reconciliation against the published release history:
            add missing tags, correct wrong ones, create minimal @since javadoc
            for undocumented types, and remove redundant tags.
          body: |
            Automated `@since` reconciliation for `${{ inputs.branch }}` (version `${{ steps.ver.outputs.dev }}`).

            Generated by `.github/workflows/update-since-tags.yml`. See the run's job summary for counts.
          delete-branch: true
