import org.jetbrains.kotlin.gradle.dsl.JvmTarget

/***********************************************************************************************************************
 *
 * Plugins
 *
 **********************************************************************************************************************/
plugins {
    id 'java-gradle-plugin'
	id 'maven-publish'
    id 'idea'
    id 'com.gradle.plugin-publish' version '1.3.1'
    id 'org.jetbrains.kotlin.jvm' version '1.9.20'
    id 'org.jetbrains.dokka' version '1.8.20'
}

/***********************************************************************************************************************
 *
 * Basic properties
 *
 **********************************************************************************************************************/

def pom = new XmlSlurper().parse(rootProject.file('pom.xml'))
defaultTasks('jar', 'test')
group pom.parent.groupId
version = project.hasProperty('vaadin.version') ? project.getProperty('vaadin.version') : pom.parent.version
archivesBaseName = pom.artifactId
sourceCompatibility = 21
targetCompatibility = 21

/***********************************************************************************************************************
 *
 * Sources
 *
 **********************************************************************************************************************/

sourceSets {
    functionalTest {
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}

configurations {
    functionalTestImplementation.extendsFrom testImplementation
}

// The plugin-publish plugin (1.x) automatically registers `sourcesJar` and
// `javadocJar` tasks and includes their output in the published plugin
// artifacts. Package the Dokka-generated API documentation into the javadoc
// jar so the published javadoc reflects the Kotlin sources.
tasks.matching { it.name == 'javadocJar' }.configureEach {
    dependsOn dokkaJavadoc
    from dokkaJavadoc.outputDirectory
}

/***********************************************************************************************************************
 *
 * Repositories & Dependencies
 *
 **********************************************************************************************************************/

repositories {
    mavenLocal()
    mavenCentral()
    maven { url = 'https://plugins.gradle.org/m2/' }
    maven { url = 'https://maven.vaadin.com/vaadin-prereleases' }
}

dependencies {
    implementation('org.jetbrains.kotlin:kotlin-stdlib:1.9.20')

    implementation("com.vaadin:flow-plugin-base:${pom.parent.version}")

    testImplementation("junit:junit:4.13.2")
    testImplementation("org.jetbrains.kotlin:kotlin-test:1.9.20")
}

idea {
    module {
        downloadJavadoc = true
        downloadSources = true
    }
}

/***********************************************************************************************************************
 *
 * Artifacts
 *
 **********************************************************************************************************************/

jar {
    manifest{
        attributes(
                'Vaadin-Package-Version': 1,
                'Implementation-Title': 'Vaadin Gradle Plugin',
                'Implementation-Version': archiveVersion,
                'Implementation-Vendor': 'Vaadin Ltd',
        )
    }
    from 'gradle.properties'
}

/***********************************************************************************************************************
 *
 * Testing & Quality
 *
 ***********************************************************************************************************************/
task functionalTest(type: Test) {
    dependsOn test, jar
    group = 'Verification'

    testClassesDirs = sourceSets.functionalTest.output.classesDirs
    classpath = sourceSets.functionalTest.runtimeClasspath
    maxParallelForks = 1
    jvmArgs('-Xms512M', '-Xmx1024M')
    testLogging {
        exceptionFormat = 'full'
        showStandardStreams = true
    }
}
check.dependsOn functionalTest
/***********************************************************************************************************************
 *
 * Deployment
 *
 ***********************************************************************************************************************/
// As of plugin-publish 1.x the bundle metadata (website, vcsUrl, display name,
// description, tags) lives directly in the gradlePlugin block; the separate
// pluginBundle block has been removed. The plugin also auto-applies
// java-gradle-plugin and maven-publish and creates a single `pluginMaven`
// publication (jar + sources + javadoc) used by publishPlugins, so no manual
// MavenPublication is declared here.
gradlePlugin {
    website = 'https://vaadin.com/docs/latest/flow/configuration/gradle'
    vcsUrl = 'https://github.com/vaadin/flow'
    testSourceSets sourceSets.functionalTest
    plugins {
        flowPlugin {
            id = 'com.vaadin.flow'
            implementationClass = 'com.vaadin.flow.gradle.FlowPlugin'
            displayName = 'Vaadin Flow Gradle Plugin'
            description = 'Build Vaadin Flow applications with Gradle. Please follow the link below to learn which Plugin version to use with particular Vaadin version. Vaadin recommends using the latest Vaadin LTS version.'
            tags.set(['vaadin-flow'])
        }
    }
}

/***********************************************************************************************************************
 *
 * Misc.
 *
 **********************************************************************************************************************/
wrapper {
    gradleVersion = '8.14'
    distributionType = Wrapper.DistributionType.ALL
}

// Travis kills the build if there's no stdout for 10 minutes: https://docs.travis-ci.com/user/common-build-problems/#build-times-out-because-no-output-was-received
// This will print ongoing tests, taken from https://stackoverflow.com/a/4292739/377320
functionalTest {
    testLogging {
        info.events "passed", "skipped", "failed"
    }
}

kotlin {
    compilerOptions {
        jvmTarget = JvmTarget.JVM_21
    }
    explicitApi()
}

