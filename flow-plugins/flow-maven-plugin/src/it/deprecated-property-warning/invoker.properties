# Single execution testing five scenarios:
# - old property only via -D: node.download.root (should warn about deprecation)
# - old property only via POM <properties>: node.version (should warn about deprecation)
# - new property only: vaadin.pnpm.enable (should NOT warn)
# - both old and new: build.folder + vaadin.build.folder (should warn old is ignored)
# - not migrated property: -Dskip=true must NOT skip the goal (vaadin.skip was always prefixed)
invoker.goals=-ntp clean flow:prepare-frontend -Dnode.download.root=https://nodejs.org/dist/ -Dvaadin.pnpm.enable=false -Dbuild.folder=old-target -Dvaadin.build.folder=target -Dskip=true
invoker.buildResult=success
